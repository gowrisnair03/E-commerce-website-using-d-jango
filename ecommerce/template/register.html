<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Shop Registration</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #f4fff4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
            color: green;
        }

        .form-group{
            margin-bottom: 15px;
        }

        label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background: darkgreen;
        }

    </style>

</head>
<body>

    <div class="container">

        <h2>Register</h2>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>First Name</label>
                <input 
                    type="text" 
                    name="first_name" 
                    placeholder="Enter first name"
                    required
                >
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input 
                    type="text" 
                    name="last_name" 
                    placeholder="Enter last name"
                    required
                >
            </div>

            <div class="form-group">
                <label>Email</label>
                <input 
                    type="email" 
                    name="email" 
                    placeholder="Enter email"
                    required
                >
            </div>

            <!-- <div class="form-group">
                <label>Phone Number</label>
                <input 
                    type="text" 
                    name="phone" 
                    placeholder="Enter phone number"
                    required
                >
            </div> -->

            <div class="form-group">
                <label>Password</label>
                <input 
                    type="password" 
                    name="password" 
                    placeholder="Enter password"
                    required
                >
            </div>

            <button type="submit">Register</button>

        </form>

    </div>

</body>
</html>
